version: '3.8'

services:
  soulos-studio:
    build:
      context: .
      dockerfile: packages/soulos-studio/Dockerfile
    container_name: senticore-soulos-studio
    ports:
      - "8765:8765"
    environment:
      - SOULOS_KERNEL_URL=http://soulos-kernel:8000
    depends_on:
      soulos-kernel:
        condition: service_started
    networks:
      - senticore_net

  soulos-kernel:
    build:
      context: .
      dockerfile: packages/soulos-core/Dockerfile
    container_name: senticore-soulos-kernel
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+asyncpg://postgres:changeme_local_dev@db:5432/senticore
      - INFERENCE_API_URL=${INFERENCE_API_URL:-http://ollama:11434}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-768}
      - INFERENCE_SKIP_PULL=${INFERENCE_SKIP_PULL:-0}
      - MODEL_NAME=${MODEL_NAME:-llama3}
      - EMBED_MODEL_NAME=${EMBED_MODEL_NAME:-nomic-embed-text}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - senticore_net

  db:
    image: pgvector/pgvector:pg16
    container_name: senticore-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_local_dev}
      POSTGRES_DB: ${POSTGRES_DB:-senticore}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - senticore_net

  ollama:
    image: ollama/ollama:latest
    container_name: senticore-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - senticore_net
    command: ["serve"]

  soulos-inference-bridge:
    build:
      context: .
      dockerfile: packages/soulos-inference-bridge/Dockerfile
    container_name: senticore-inference-bridge
    profiles: ["bridge-mock", "bridge-aws", "bridge-vertex"]
    ports:
      - "11434:11434"
    environment:
      - BRIDGE_MODE=${BRIDGE_MODE:-mock}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-768}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - BEDROCK_CHAT_MODEL_ID=${BEDROCK_CHAT_MODEL_ID:-amazon.nova-lite-v1:0}
      - BEDROCK_EMBED_MODEL_ID=${BEDROCK_EMBED_MODEL_ID:-amazon.titan-embed-text-v2:0}
      - VERTEX_PROJECT_ID=${VERTEX_PROJECT_ID:-}
      - VERTEX_LOCATION=${VERTEX_LOCATION:-us-central1}
      - VERTEX_CHAT_MODEL=${VERTEX_CHAT_MODEL:-gemini-2.0-flash-001}
      - VERTEX_EMBED_MODEL=${VERTEX_EMBED_MODEL:-text-embedding-004}
    networks:
      - senticore_net

networks:
  senticore_net:
    driver: bridge

volumes:
  postgres_data:
  ollama_data:
