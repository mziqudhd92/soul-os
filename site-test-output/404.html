<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SoulOS Tutorials</title>
  <base href="/soul-os/" />
  <link rel="stylesheet" href="static/studio.css" />
  <meta name="description" content="Interactive SoulOS tutorials — Python bot integration, quickstart, HEXACO psychometrics, MCP, and deployment guides." />
</head>
<body class="tutorials-site">
  <div class="bg-glow" aria-hidden="true"></div>

  <header class="header">
    <a class="logo" href="/soul-os/" aria-label="SoulOS Tutorials home">
      <span class="logo-mark">S</span>
      <span class="logo-text">SoulOS Tutorials</span>
    </a>

    <div class="header-nav">
      <a class="btn ghost sm" href="https://github.com/mziqudhd92/soul-os" target="_blank" rel="noopener">GitHub</a>
      <a class="btn ghost sm" href="https://github.com/mziqudhd92/soul-os#quickstart" target="_blank" rel="noopener">Run Studio locally</a>
      <button type="button" id="btn-theme" class="btn ghost icon" title="Toggle theme" aria-label="Toggle theme">☾</button>
    </div>
  </header>

  <div class="page-shell">
    <div id="view-tutorial" class="view view-active">
      <div class="tutorial-wrap">
        <div id="tutorial-list-view">
          <header class="page-intro">
            <h1>Tutorials</h1>
            <p>Step-by-step guides for SoulOS Studio, integration, and deployment. Interactive walkthroughs work offline; run <code>docker compose up</code> locally for kernel health checks and live chat.</p>
          </header>
          <div id="tutorial-grid" class="tutorial-grid"></div>
        </div>
        <div id="tutorial-detail-view" class="hidden">
          <button type="button" id="tutorial-back" class="btn ghost sm">← All tutorials</button>
          <article class="panel prose-panel flat">
            <div id="tutorial-meta" class="tutorial-meta"></div>
            <div id="tutorial-content" class="prose"></div>
          </article>
        </div>
      </div>
    </div>
  </div>

  <script src="static/tutorial-python-bot.js"></script>
  <script src="static/tutorial-terminal.js"></script>
  <script>
    window.STUDIO_STATIC = true;
    window.STUDIO_BASE = "/soul-os/";
  </script>
  <script src="static/tutorials-static.js"></script>
</body>
</html>
