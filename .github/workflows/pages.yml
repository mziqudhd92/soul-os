name: GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SoulOS Studio (tutorial export)
        run: |
          python -m pip install --upgrade pip
          pip install -e "packages/soulos-studio[dev]"

      - name: Build tutorials static site
        run: python scripts/build-studio-tutorials-site.py --out site --base /soul-os/

      - name: Verify python-bot interactive export
        run: |
          python -c "
          import json
          from pathlib import Path
          p = Path('site/data/tutorials/python-bot.json')
          d = json.loads(p.read_text())
          assert d['format'] == 'interactive'
          assert len(d['steps']) >= 5
          assert (Path('site/.nojekyll')).is_file()
          "

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          force_orphan: true
