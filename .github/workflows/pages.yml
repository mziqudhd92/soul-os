name: GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SoulOS Studio (tutorial export)
        run: |
          python -m pip install --upgrade pip
          pip install -e "packages/soulos-studio[dev]"

      - name: Build tutorials static site
        run: python scripts/build-studio-tutorials-site.py --out site --base /soul-os/

      - name: Verify python-bot interactive export
        run: |
          python -c "
          import json
          from pathlib import Path
          p = Path('site/data/tutorials/python-bot.json')
          d = json.loads(p.read_text())
          assert d['format'] == 'interactive'
          assert len(d['steps']) >= 5
          "

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
