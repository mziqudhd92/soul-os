[project]
name = "soulos-core"
version = "0.1.0"
description = "SoulOS kernel — FastAPI runtime for avatar state, memory, and dual-process inference"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.111.0",
    "uvicorn>=0.30.1",
    "httpx>=0.27.0",
    "sqlalchemy>=2.0.30",
    "asyncpg>=0.29.0",
    "pgvector>=0.3.0",
    "pydantic>=2.7.4",
    "pydantic-settings>=2.3.4",
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-mock>=3.14.0",
    "mcp>=1.0.0",
    "jsonschema>=4.22.0",
    "pyyaml>=6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = [
    "main.py",
    "config.py",
    "schemas.py",
    "dependencies.py",
    "auth.py",
    "tenant.py",
    "mcp_server.py",
    "soul_validation.py",
    "soul_compile.py",
    "runtime",
]

[tool.ruff]
line-length = 88
target-version = "py312"
