[project]
name = "soulos-studio"
version = "0.1.0"
description = "SoulOS Studio — pip-installable soul builder (HEXACO MSV, export .soul.json)"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.111.0",
    "uvicorn[standard]>=0.30.1",
    "httpx>=0.27.0",
    "jsonschema>=4.22.0",
    "markdown>=3.6",
    "pyyaml>=6.0",
]

[project.scripts]
soulos-studio = "soulos_studio.cli:main"

[project.optional-dependencies]
dev = ["pytest>=8.0.0", "pytest-asyncio>=0.23.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["soulos_studio"]

[tool.hatch.build.targets.wheel.force-include]
"soulos_studio/schemas/soul.schema.json" = "soulos_studio/schemas/soul.schema.json"
"soulos_studio/static/index.html" = "soulos_studio/static/index.html"
"soulos_studio/static/studio.css" = "soulos_studio/static/studio.css"
"soulos_studio/static/studio.js" = "soulos_studio/static/studio.js"
"soulos_studio/static/tutorial-python-bot.js" = "soulos_studio/static/tutorial-python-bot.js"
"soulos_studio/static/tutorial-terminal.js" = "soulos_studio/static/tutorial-terminal.js"
"soulos_studio/static/tutorial-soul-builder.js" = "soulos_studio/static/tutorial-soul-builder.js"
"soulos_studio/static/tutorials-static.js" = "soulos_studio/static/tutorials-static.js"
"soulos_studio/static/tutorials-index.html" = "soulos_studio/static/tutorials-index.html"
"soulos_studio/content/tutorials/deploy-and-chat.md" = "soulos_studio/content/tutorials/deploy-and-chat.md"

[tool.pytest.ini_options]
testpaths = ["tests"]
